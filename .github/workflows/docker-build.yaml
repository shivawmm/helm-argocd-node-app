name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t shivawmm1810/quote-api-app:${{ github.sha }} .
          docker push shivawmm1810/quote-api-app:${{ github.sha }}

      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/shivawmm/helm-argocd-gitops.git

      - name: Update Helm Values Tag
        run: |
          cd helm-argocd-gitops/chart/quote-api-app

          sed -i 's/tag:.*/tag: \"${{ github.sha }}\"/' values.yaml

      - name: Commit and Push Changes
        run: |
          cd helm-argocd-gitops

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          git add .

          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"

          git push